version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - CHROMA_PATH=/data/vector_db
      - DB_PATH=/data/db.sqlite
      - IMAGE_DIR=/data/images
      - OLLAMA_HOST=http://localhost:11434
      - OLLAMA_MODEL=medgemma
    # Note: For GPU support, add:
    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
