services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./api/prisma/dev.db:/app/prisma/dev.db
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=http://backend:8000
      - DEBUG=true
    restart: unless-stopped
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_DEBUG=true
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped
    depends_on:
      - api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/data
      - ./save:/save
    environment:
      - DATA_DIR=/data
      - CHROMA_PATH=/data/vector_db
      - DB_PATH=/data/db.sqlite
      - IMAGE_DIR=/data/images
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=medgemma
      - DEBUG=true
    restart: unless-stopped
